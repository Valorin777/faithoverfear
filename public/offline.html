<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B2A4A" />
  <title>Нет соединения — Faith over Fear</title>
  <style>
    :root { --navy:#1B2A4A; --gold:#C9A84C; --cream:#EFE7D6; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      min-height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem; padding: 2rem;
      background: radial-gradient(circle at 50% 38%, #18243f 0%, #111d33 60%, #0c1526 100%);
      color: var(--cream);
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
    }
    .badge {
      width: 96px; height: 96px; border-radius: 50%;
      background: radial-gradient(circle at 50% 38%, #20201d 0%, #121110 70%, #0c0b0a 100%);
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 0; color: #fff; }
    p { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 300; color: rgba(255,255,255,.6); margin: 0; max-width: 22rem; line-height: 1.6; font-size: .95rem; }
    button {
      margin-top: .5rem; padding: .8rem 1.75rem; cursor: pointer;
      background: transparent; color: var(--gold);
      border: 1.5px solid var(--gold); border-radius: 4px;
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: .8rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      transition: background .15s, color .15s;
    }
    button:hover { background: var(--gold); color: var(--navy); }
    .eyebrow { font-family: -apple-system, 'Segoe UI', sans-serif; font-size:.6rem; letter-spacing:.3em; text-transform:uppercase; color: var(--gold); }
  </style>
</head>
<body>
  <div class="badge">
    <svg width="40" height="60" viewBox="0 0 100 150" fill="none" aria-hidden="true">
      <g stroke="#C9A84C" stroke-linecap="round">
        <line x1="50" y1="12" x2="50" y2="138" stroke-width="9" />
        <line x1="37" y1="32" x2="63" y2="32" stroke-width="8" />
        <line x1="26" y1="58" x2="74" y2="58" stroke-width="9" />
        <line x1="34" y1="108" x2="66" y2="94" stroke-width="8" />
      </g>
    </svg>
  </div>
  <div class="eyebrow">Faith over Fear</div>
  <h1>Нет соединения</h1>
  <p>Похоже, пропал интернет. Проверьте подключение — и страница откроется. Уже просмотренные разделы доступны и без сети.</p>
  <button type="button" onclick="location.reload()">Повторить</button>
</body>
</html>
